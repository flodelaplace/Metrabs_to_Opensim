# Install: conda env create --file environment.yml
# Activate: conda activate metrabs_opensim
name: metrabs_opensim
channels:
  - defaults
  - conda-forge
dependencies:
  - python=3.10
  - pip
  - ffmpeg
  - cudatoolkit=11.8
  - cudnn=8.9
  # OpenSim (optional, only needed for --ik):
  # conda install -c opensim-org opensim
  - pip:
      - tensorflow==2.12.0
      - tensorflow-hub
      - tensorflow-addons
      - numpy
      - scipy
      - imageio
      - imageio-ffmpeg
      - opencv-python
      - tqdm
      - lxml
      - supervision
      - git+https://github.com/isarandi/cameralib.git
